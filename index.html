<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的故事</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f0f3f5;
        }
        /* 顶部标题栏 */
        .header {
            background-color: #80cbc4;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
        }
        .sub-title {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin: 10px 0;
        }
        /* 时间线容器 */
        .timeline {
            position: relative;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        /* 中间竖线 */
        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background-color: #80cbc4;
        }
        /* 时间线条目 */
        .timeline-item {
            position: relative;
            margin-bottom: 40px;
            width: 50%;
        }
        .timeline-item.left {
            left: 0;
            padding-right: 40px;
            text-align: right;
        }
        .timeline-item.right {
            left: 50%;
            padding-left: 40px;
        }
        /* 圆点标记 */
        .timeline-item::after {
            content: '';
            position: absolute;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #80cbc4;
            border: 3px solid white;
        }
        .timeline-item.left::after {
            right: -6px;
        }
        .timeline-item.right::after {
            left: -6px;
        }
        /* 日期标签 */
        .date-tag {
            display: inline-block;
            background-color: #80cbc4;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 8px;
        }
        /* 标题和内容 */
        .item-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        .item-content {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }
        /* 底部署名 */
        .footer {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin: 50px 0 20px;
        }
        /* 添加按钮 */
        .add-btn {
            display: block;
            width: 200px;
            height: 45px;
            line-height: 45px;
            background-color: #80cbc4;
            color: white;
            text-align: center;
            border-radius: 25px;
            margin: 30px auto;
            cursor: pointer;
            font-size: 16px;
            border: none;
        }
        .add-btn:hover {
            background-color: #60b0a8;
        }
        /* 弹窗表单 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .modal-content textarea {
            resize: none;
            height: 80px;
        }
        .modal-btns {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 15px;
        }
        .modal-btns button {
            padding: 8px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-save {
            background-color: #80cbc4;
            color: white;
        }
        .btn-cancel {
            background-color: #ddd;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">我们的故事</div>
    <div class="sub-title">经历由我们创造</div>

    <div class="timeline" id="timeline">
        <!-- 初始条目 -->
        <div class="timeline-item left">
            <div class="item-title">txy与sry的故事</div>
            <div class="item-content">我们从此刻相遇，从此时间便有了故事</div>
        </div>
        <div class="timeline-item right">
            <div class="date-tag">故事开始</div>
        </div>
    </div>

    <button class="add-btn" id="addBtn">+ 添加新故事</button>
    <div class="footer">爱你，sry</div>

    <!-- 弹窗表单 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>添加新故事</h3>
            <input type="text" id="newTitle" placeholder="输入标题">
            <textarea id="newContent" placeholder="输入内容描述"></textarea>
            <input type="date" id="newDate">
            <div class="modal-btns">
                <button class="btn-cancel" id="cancelBtn">取消</button>
                <button class="btn-save" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        const addBtn = document.getElementById('addBtn');
        const modal = document.getElementById('modal');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');
        const timeline = document.getElementById('timeline');

        // 打开弹窗
        addBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        // 关闭弹窗
        cancelBtn.addEventListener('click', () => {
            modal.style.display = 'none';
            document.getElementById('newTitle').value = '';
            document.getElementById('newContent').value = '';
            document.getElementById('newDate').value = '';
        });

        // 保存新条目
        saveBtn.addEventListener('click', () => {
            const title = document.getElementById('newTitle').value;
            const content = document.getElementById('newContent').value;
            const date = document.getElementById('newDate').value;

            if (!title || !content || !date) {
                alert('请填写完整信息！');
                return;
            }

            // 交替左右布局
            const items = document.querySelectorAll('.timeline-item');
            const isLeft = items.length % 2 === 0;

            // 创建新条目
            const newItem = document.createElement('div');
            newItem.className = `timeline-item ${isLeft ? 'left' : 'right'}`;
            newItem.innerHTML = `
                <div class="date-tag">${date}</div>
                <div class="item-title">${title}</div>
                <div class="item-content">${content}</div>
            `;

            timeline.appendChild(newItem);
            modal.style.display = 'none';
            // 清空表单
            document.getElementById('newTitle').value = '';
            document.getElementById('newContent').value = '';
            document.getElementById('newDate').value = '';
        });
    </script>
</body>
</html>
