<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我们的故事--sry和txy</title>
    
    <link rel="icon" href="https://vjhzbpzdewthyklhxbmx.supabase.co/storage/v1/object/public/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="https://vjhzbpzdewthyklhxbmx.supabase.co/storage/v1/object/public/images/favicon.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="我们的故事">
    
    <link rel="manifest" href="manifest.json">
    <script src="supabase.js"></script>
    <style>
        :root { --primary-color: #92CBCA; --bg-color: #f7f9f9; --text-color: #444; --card-bg: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'PingFang SC', sans-serif; color: var(--text-color); margin: 0; }
        
        .hero-section {
            position: relative;
            height: 500px; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            overflow: hidden; 
        }
        
        #heroBg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out;
            z-index: 1; 
        }
        
        
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 2; 
        }
        
     
        .hero-section h1, .hero-section p { 
            position: relative; 
            z-index: 3; 
        }

        #timeline { position: relative; max-width: 800px; margin: -30px auto 50px; padding: 20px; z-index: 10; }
        #timeline::before { content: ''; position: absolute; left: 50%; width: 2px; height: 100%; background: var(--primary-color); transform: translateX(-50%); }
        
        #timeline ul { list-style: none; padding: 0; }
        #timeline ul li { position: relative; width: 50%; margin-bottom: 40px; clear: both; }
        #timeline ul li:nth-child(odd) { float: left; text-align: right; padding-right: 35px; box-sizing: border-box; }
        #timeline ul li:nth-child(even) { float: right; text-align: left; padding-left: 35px; box-sizing: border-box; }

      
        #timeline ul li::after {
            content: ''; position: absolute; width: 12px; height: 12px; 
            background: white; border: 3px solid var(--primary-color); border-radius: 50%;
            top: 20px; z-index: 11;
        }
        #timeline ul li:nth-child(odd)::after { right: -9px; }
        #timeline ul li:nth-child(even)::after { left: -9px; }

        .content-card { background: var(--card-bg); padding: 18px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .story-img { width: 100%; border-radius: 10px; margin-top: 12px; cursor: pointer; }
        .time-tag { display: inline-block; color: var(--primary-color); font-weight: bold; font-size: 0.85em; margin-bottom: 8px; }

   
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #92CBCA; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 25px; text-align: center; width: 80%; max-width: 300px; }
        .login-overlay.hidden { opacity: 0; visibility: hidden; }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: none; z-index: 200; box-shadow: 0 5px 15px rgba(146, 203, 202, 0.4); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
      
        @keyframes rotating {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .music-on { animation: rotating 3s linear infinite; }
        
        .music-control {
            position: fixed;
            bottom: 30px;
            left: 30px; 
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            display: none; 
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; }
        
        input, textarea { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.3s; }

        @media (max-width: 600px) {
            #timeline::before { left: 20px; }
            #timeline ul li { width: 100%; text-align: left !important; padding-left: 45px !important; }
            #timeline ul li::after { left: 12px !important; }
        }
        .content-card { 
            background: var(--card-bg); 
            padding: 18px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1.5px solid transparent; 
            transition: all 0.3s ease;
        }
        .card-txy {
            border-color: #d1e5e4 !important;
            background-color: #fbfdfd; 
        }
        .author-txy { 
            background-color: #e8f3f2; 
            color: #78a5a4; 
        }
        .card-sry {
            border-color: #cfe5f8 !important;
            background-color: #fafdff; 
        }
        .author-sry { 
            background-color: #e3f2fd; 
            color: #7ba6c9; 
        }
        .author-tag {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>🤍 我们的故事</h3>
        <input type="password" id="passwordInput" placeholder="输入密码解锁编辑模式~（你的生日四位数字）" onkeyup="if(event.keyCode==13) checkPassword()">
        <button onclick="checkPassword()" style="background:var(--primary-color); color:white; border:none; padding:12px; border-radius:25px; width:100%; margin-top:10px; margin-bottom:8px;">写故事进入~</button>
        
        <button onclick="enterAsGuest()" style="background-color: #f0f2f2; border: none; color: #666; padding: 12px; border-radius: 25px; width: 100%; margin-top: 15px; font-size: 0.85em; cursor: pointer; display: block;">只是欣赏~</button>
    </div>
</div>
    <audio id="bgMusic" loop>
    <source src="https://vjhzbpzdewthyklhxbmx.supabase.co/storage/v1/object/public/images/gaobaiqiqiu.mp3" type="audio/mpeg">
</audio>

<div id="musicBtn" class="music-control" onclick="toggleMusic()">🎵</div>

<div class="hero-section">
    <div id="heroBg"></div>
    <div class="hero-overlay"></div>
    
    <h1>从相遇那天起，我们的故事开始书写</h1>
    <p id="daysCount">正在加载我们的时光</p>
</div>

<div id="timeline"><ul id="storyList"></ul></div>

<button class="fab" onclick="openModal()">＋</button>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h3>记录这一刻</h3>
        <input type="text" id="titleInput" placeholder="标题">
        <textarea id="contentInput" rows="4" placeholder="写下你们的故事..."></textarea>
        
        <label style="font-size: 0.8em; color: #666;">发生时间：</label>
        <input type="datetime-local" id="dateInput">
        <label style="font-size: 0.8em; color: #666; display: block; margin-top: 10px;">记录人：</label>
        <div style="display: flex; gap: 20px; margin: 8px 0;">
            <label style="font-size: 0.9em; cursor: pointer;">
                <input type="radio" name="author" value="sry" checked style="width: auto; margin-right: 5px;"> sry
            </label>
            <label style="font-size: 0.9em; cursor: pointer;">
                <input type="radio" name="author" value="txy" style="width: auto; margin-right: 5px;"> txy
            </label>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeModal()" style="background:none; border:none; color:#999;">取消</button>
            <button id="saveBtn" onclick="saveStory()" style="background:var(--primary-color); color:white; border:none; padding:10px 25px; border-radius:15px;">保存到时间轴</button>
        </div>
    </div>
</div>

<script>
    let isAdmin = false;
    let bgImages = []; 
    let currentBgIndex = 0;
    let bgTimer = null; 

    const SUPABASE_URL = 'https://vjhzbpzdewthyklhxbmx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_PPGrvCINKV_SxyxcQ0pygg_JWkMAHgp';
    const START_DATE = '2025-11-12'; 

    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
            persistSession: false, 
            autoRefreshToken: false,
            detectSessionInUrl: false
        }
    });

   
    window.onload = () => {
        updateDays();
        const savedRole = localStorage.getItem('unlocked_role');
        if (savedRole) {
            const loginBox = document.querySelector('.login-box');
            loginBox.innerHTML = `
                <h3 style="margin-bottom:10px;">欢迎回来 🤍</h3>
                <p style="color:#666; font-size:0.9em; margin-bottom:20px;">当前身份：${savedRole === 'admin' ? '我们' : '访客'}</p>
                <button onclick="startWithMusic()" style="background:var(--primary-color); color:white; border:none; padding:12px; border-radius:25px; width:100%; font-weight:bold; cursor:pointer;">继续</button>
                <div style="margin-top: 20px;">
                    <span onclick="logout()" style="color:#5a8a89; font-size:0.85em; text-decoration:underline; cursor:pointer; padding:5px;">切换身份</span>
                </div>
            `;
        }
    };

    function logout() {
        localStorage.removeItem('unlocked_role');
        location.reload(); 
    }

    function updateDays() {
        const start = new Date(START_DATE);
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        document.getElementById('daysCount').innerText = `这是我们相识的第 ${diff} 天`;
    }

    function checkPassword() {
        let input = document.getElementById('passwordInput').value;
        
       
        input = input.replace(/[\uFF10-\uFF19]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xfee0));
        input = input.replace(/\s+/g, '');

        if (!input) return alert("请输入口令哦");

       
        let magic = 0;
        for (let i = 0; i < input.length; i++) {
           
            magic += (input.charCodeAt(i) * (i + 1)) ^ (0x521 + i);
        }
        
        
        if (magic === (75 * 74 + 23)) {
            localStorage.setItem('unlocked_role', 'admin');
            startWithMusic();
        } else {
            alert("口令不对哦~");
        }
    }
    function enterAsGuest() {
        localStorage.setItem('unlocked_role', 'guest');
        startWithMusic();
    }

    function startWithMusic() {
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        if (audio) {
            audio.play().then(() => {
                if (musicBtn) {
                    musicBtn.style.display = 'flex';
                    musicBtn.classList.add('music-on');
                }
            }).catch(e => console.log("播放受限"));
        }
        unlockPage();
    }

    function toggleMusic() {
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('music-on');
        } else {
            audio.pause();
            musicBtn.classList.remove('music-on');
        }
    }

    function unlockPage() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('musicBtn').style.display = 'flex';
        const role = localStorage.getItem('unlocked_role');
        const fab = document.querySelector('.fab');
        if (fab) {
            fab.style.display = (role === 'admin') ? 'flex' : 'none';
        }
        loadStories();
    }

    async function loadStories() {
        const { data, error } = await _supabase
            .from('stories')
            .select('*')
            .order('event_date', { ascending: false });

        if (error) return;

        bgImages = data.filter(item => item.img_url).map(item => item.img_url).slice(0, 5);
        if (bgImages.length > 0) {
            startBgSlideshow();
        } else {
            document.getElementById('heroBg').style.backgroundImage = "url('https://picsum.photos/1920/1080?love')";
        }

        const list = document.getElementById("storyList");
        list.innerHTML = '';
        data.forEach(item => {
            const li = document.createElement("li");
            const d = new Date(item.event_date);
            const dateStr = `${d.getFullYear()}年${(d.getMonth()+1).toString().padStart(2,'0')}月${d.getDate().toString().padStart(2,'0')}日`;
            
            // 1. 确定作者对应的类名
            const isTxy = item.author === 'txy';
            const cardClass = isTxy ? 'card-txy' : 'card-sry';
            const authorClass = isTxy ? 'author-txy' : 'author-sry';
            
            // 2. 组装 HTML
            const authorTag = item.author ? `<span class="author-tag ${authorClass}">${item.author}</span>` : '';
            
            li.innerHTML = `
            <div class="content-card ${cardClass}">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span class="time-tag" style="margin:0; opacity:0.7;">${dateStr}</span>
                    ${authorTag}
                </div>
                <h3 style="margin:0; font-size:1em; color:#444;">${item.title || ''}</h3>
                <p style="margin:10px 0; color:#666; font-size:0.92em; line-height:1.6; white-space:pre-wrap;">${item.content}</p>
                ${item.img_url ? `<img src="${item.img_url}" class="story-img" loading="lazy" onclick="window.open(this.src)">` : ''}
            </div>`;
            list.appendChild(li);
        });
    }

    function startBgSlideshow() {
        if (bgTimer) clearInterval(bgTimer);
        const heroBg = document.getElementById('heroBg');
        heroBg.style.backgroundImage = `url(${bgImages[0]})`;
        if (bgImages.length <= 1) return;
        bgTimer = setInterval(() => {
            currentBgIndex = (currentBgIndex + 1) % bgImages.length;
            heroBg.style.backgroundImage = `url(${bgImages[currentBgIndex]})`;
        }, 10000);
    }

    async function saveStory() {
        if (localStorage.getItem('unlocked_role') !== 'admin') {
            alert("访客模式无法发布内容哦~");
            return;
        }

        const btn = document.getElementById('saveBtn');
        const fileInput = document.getElementById('fileInput');
        const title = document.getElementById('titleInput').value;
        const content = document.getElementById('contentInput').value;
        let event_date = document.getElementById('dateInput').value;
        const author = document.querySelector('input[name="author"]:checked').value;

        if (!content) return alert("内容是必须的哦");

        if (fileInput.files.length > 0) {
            if (fileInput.files[0].size > 5 * 1024 * 1024) {
                return alert("图片太大了，请压缩到 5MB 以内再上传哦~");
            }
        }

        btn.disabled = true; 
        btn.innerText = "写入中...";

        try {
            let img_url = "";
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const newFileName = `${Date.now()}_${Math.floor(Math.random() * 1000)}.${fileExt}`;

                const { data, error: upError } = await _supabase.storage
                    .from('images')
                    .upload(newFileName, file);
                
                if (upError) throw upError;
                img_url = _supabase.storage.from('images').getPublicUrl(newFileName).data.publicUrl;
            }

            const { error: dbError } = await _supabase.from('stories').insert([{ 
                title, 
                content, 
                img_url, 
                author,
                event_date: event_date ? new Date(event_date).toISOString() : new Date().toISOString()
            }]);

            if (dbError) throw dbError;

            closeModal(); 
            await loadStories();
            window.scrollTo({ top: document.getElementById('timeline').offsetTop - 50, behavior: 'smooth' });
            
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
            fileInput.value = '';
            document.querySelector('input[name="author"][value="sry"]').checked = true;

        } catch (e) { 
            alert("保存失败"); 
            console.error(e); 
        } finally { 
            btn.disabled = false; 
            btn.innerText = "保存到时间轴"; 
        }
    }

    function openModal() { 
        document.getElementById('addModal').style.display = 'flex'; 
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateInput').value = now.toISOString().slice(0, 16);
    }
    
    function closeModal() { 
        document.getElementById('addModal').style.display = 'none'; 
    }
</script>
</body>
</html>
