<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="apple-touch-icon" href="https://vjhzbpzdewthyklhxbmx.supabase.co/storage/v1/object/public/images/favicon.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="我们的故事">
    
    <link rel="manifest" href='data:application/json,{"name":"我们的故事","short_name":"我们的故事","icons":[{"src":"https://vjhzbpzdewthyklhxbmx.supabase.co/storage/v1/object/public/images/favicon.png","sizes":"192x192","type":"image/png"},{"src":"https://vjhzbpzdewthyklhxbmx.supabase.co/storage/v1/object/public/images/favicon.png","sizes":"512x512","type":"image/png"}],"start_url":"/","display":"standalone","background_color":"#f7f9f9","theme_color":"#92CBCA"}'>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... 之前的样式 ... */
        :root { --primary-color: #92CBCA; --bg-color: #f7f9f9; --text-color: #444; --card-bg: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'PingFang SC', sans-serif; color: var(--text-color); margin: 0; }
        
        /* 顶部浪漫区域 */
        /* 顶部区域容器 */
        .hero-section {
            position: relative;
            height: 300px; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            overflow: hidden; /* 必须：保证背景图不溢出到下方 */
        }
        
        /* 专门负责背景图显示的层 */
        #heroBg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out; /* 淡入淡出动画 */
            z-index: 1; /* 放在底层 */
        }
        
        /* 黑色半透明遮罩，防止背景太亮看不清字 */
        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 2; /* 放在图片上方，文字下方 */
        }
        
        /* 确保文字在最顶层 */
        .hero-section h1, .hero-section p { 
            position: relative; 
            z-index: 3; 
        }

        /* 时间轴核心样式 */
        #timeline { position: relative; max-width: 800px; margin: -30px auto 50px; padding: 20px; z-index: 10; }
        #timeline::before { content: ''; position: absolute; left: 50%; width: 2px; height: 100%; background: var(--primary-color); transform: translateX(-50%); }
        
        #timeline ul { list-style: none; padding: 0; }
        #timeline ul li { position: relative; width: 50%; margin-bottom: 40px; clear: both; }
        #timeline ul li:nth-child(odd) { float: left; text-align: right; padding-right: 35px; box-sizing: border-box; }
        #timeline ul li:nth-child(even) { float: right; text-align: left; padding-left: 35px; box-sizing: border-box; }

        /* 装饰小圆点 */
        #timeline ul li::after {
            content: ''; position: absolute; width: 12px; height: 12px; 
            background: white; border: 3px solid var(--primary-color); border-radius: 50%;
            top: 20px; z-index: 11;
        }
        #timeline ul li:nth-child(odd)::after { right: -9px; }
        #timeline ul li:nth-child(even)::after { left: -9px; }

        .content-card { background: var(--card-bg); padding: 18px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .story-img { width: 100%; border-radius: 10px; margin-top: 12px; cursor: pointer; }
        .time-tag { display: inline-block; color: var(--primary-color); font-weight: bold; font-size: 0.85em; margin-bottom: 8px; }

        /* 登录与弹窗 */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #92CBCA; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: 25px; text-align: center; width: 80%; max-width: 300px; }
        .login-overlay.hidden { opacity: 0; visibility: hidden; }

        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: none; z-index: 200; box-shadow: 0 5px 15px rgba(146, 203, 202, 0.4); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        /* 音乐旋转动画 */
        @keyframes rotating {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .music-on { animation: rotating 3s linear infinite; }
        
        .music-control {
            position: fixed;
            bottom: 30px;
            left: 30px; /* 放在左下角，和右边的 + 号对称 */
            width: 50px;
            height: 50px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            display: none; /* 初始隐藏，解锁后显示 */
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; }
        
        input, textarea { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.3s; }

        @media (max-width: 600px) {
            #timeline::before { left: 20px; }
            #timeline ul li { width: 100%; text-align: left !important; padding-left: 45px !important; }
            #timeline ul li::after { left: 12px !important; }
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h3>🤍 我们的故事</h3>
        <input type="password" id="passwordInput" placeholder="输入口令解锁...（你的阳历生日纯四位数字哦）">
        <button onclick="checkPassword()" style="background:var(--primary-color); color:white; border:none; padding:12px; border-radius:25px; width:100%; margin-top:10px;">进入</button>
    </div>
</div>
    <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="musicControl" onclick="toggleMusic()" style="position:fixed; bottom:20px; left:20px; z-index:1000; cursor:pointer; font-size:24px; display:none; opacity:0.6;">🎵</div>

<div class="hero-section">
    <div id="heroBg"></div>
    <div class="hero-overlay"></div>
    
    <h1>从相遇那天起，我们的故事开始书写</h1>
    <p id="daysCount">正在加载我们的时光...</p>
</div>

<div id="timeline"><ul id="storyList"></ul></div>

<button class="fab" onclick="openModal()">＋</button>

<div class="modal" id="addModal">
    <div class="modal-content">
        <h3>记录这一刻</h3>
        <input type="text" id="titleInput" placeholder="标题 (可选)">
        <textarea id="contentInput" rows="4" placeholder="写下你们的故事..."></textarea>
        
        <label style="font-size: 0.8em; color: #666;">发生时间：</label>
        <input type="datetime-local" id="dateInput">
        
        <input type="file" id="fileInput" accept="image/*">
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeModal()" style="background:none; border:none; color:#999;">取消</button>
            <button id="saveBtn" onclick="saveStory()" style="background:var(--primary-color); color:white; border:none; padding:10px 25px; border-radius:15px;">保存到时间轴</button>
        </div>
    </div>
</div>

<script>
    let bgImages = []; 
    let currentBgIndex = 0;
    let bgTimer = null; // 计时器变量
    // --- 请填写你的 Supabase 配置 ---
    const SUPABASE_URL = 'https://vjhzbpzdewthyklhxbmx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_PPGrvCINKV_SxyxcQ0pygg_JWkMAHgp';
    const CORRECT_PASSWORD = '0319';
    const START_DATE = '2025-11-12'; // 填入你们相遇的日期，用于计算天数

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. 初始化
    window.onload = () => {
        if (localStorage.getItem('unlocked_love') === 'true') unlockPage();
        updateDays();
        // 设置默认时间为当前时间
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateInput').value = now.toISOString().slice(0, 16);
    };

    function updateDays() {
        const start = new Date(START_DATE);
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
        document.getElementById('daysCount').innerText = `这是我们相识的第 ${diff} 天`;
    }

    function checkPassword() {
        const pwd = document.getElementById('passwordInput').value;
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');

        if (pwd === CORRECT_PASSWORD) {
            localStorage.setItem('unlocked_love', 'true');
            
            // 核心：点击进入的同时播放音乐
            audio.play().then(() => {
                musicBtn.style.display = 'flex';
                musicBtn.classList.add('music-on');
            }).catch(e => {
                console.log("音频自动播放受限，已显示按钮手动开启");
                musicBtn.style.display = 'flex';
            });

            unlockPage();
        } else { 
            alert("口令错误"); 
        }
    }

    // 新增：手动开关音乐的函数
    function toggleMusic() {
        const audio = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('music-on');
        } else {
            audio.pause();
            musicBtn.classList.remove('music-on');
        }
    }

    function unlockPage() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('musicBtn').style.display = 'flex'; // 确保按钮显示
        loadStories();
    }

    // 2. 加载故事
    // 2. 加载故事
    async function loadStories() {
        const { data, error } = await _supabase
            .from('stories')
            .select('*')
            .order('event_date', { ascending: false });

        if (error) return;

        // 1. 提取所有有图片的记录，存入轮播数组
        bgImages = data.filter(item => item.img_url).map(item => item.img_url).slice(0, 5);
        
        // 2. 开启轮播
        if (bgImages.length > 0) {
            startBgSlideshow();
        } else {
            document.getElementById('heroBg').style.backgroundImage = "url('https://picsum.photos/1920/1080?love')";
        }

        // 3. 渲染下方的列表
        const list = document.getElementById("storyList");
        list.innerHTML = '';
        data.forEach(item => {
            const li = document.createElement("li");
            const d = new Date(item.event_date);
            const year = d.getFullYear();
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const day = d.getDate().toString().padStart(2, '0');
            const dateStr = `${year}年${month}月${day}日`;
            
            // --- 注意下面这里的反引号使用 ---
           li.innerHTML = `
            <div class="content-card">
                <span class="time-tag">${dateStr}</span>
                <h3 style="margin:0; font-size:1em;">${item.title || ''}</h3>
                <p style="margin:8px 0; color:#555; font-size:0.95em; white-space:pre-wrap;">${item.content}</p>
                ${item.img_url ? `<img src="${item.img_url}" class="story-img" loading="lazy" onclick="window.open(this.src)">` : ''}
            </div>`;
            list.appendChild(li);
        });
    }

// 4. 新增：控制顶部背景轮播的函数
function startBgSlideshow() {
    // 如果已经有计时器在跑，先清除，防止重复
    if (bgTimer) clearInterval(bgTimer);
    
    const heroBg = document.getElementById('heroBg');
    
    // 立即显示第一张
    heroBg.style.backgroundImage = `url(${bgImages[0]})`;
    
    // 如果只有一张图就不轮播了
    if (bgImages.length <= 1) return;

    // 每 5 秒换一张
    bgTimer = setInterval(() => {
        currentBgIndex = (currentBgIndex + 1) % bgImages.length;
        // 加上淡入淡出效果
        heroBg.style.backgroundImage = `url(${bgImages[currentBgIndex]})`;
    }, 10000);
}
    // 3. 保存故事
  async function saveStory() {
        const title = document.getElementById('titleInput').value;
        const content = document.getElementById('contentInput').value;
        let event_date = document.getElementById('dateInput').value;
// 如果用户没选具体时间，datetime-local 可能只返回日期
// 我们确保它符合 ISO 格式，Supabase 就能精准识别时区
        if (event_date) {
            const localDate = new Date(event_date);
            event_date = localDate.toISOString(); 
        }
        const fileInput = document.getElementById('fileInput');
        
        if (!content) return alert("内容是必须的哦");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; 
        btn.innerText = "写入时间轴...";

        try {
            let img_url = "";
            // --- 图片处理开始 ---
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                
                // 核心修复：这里不再使用 file.name，而是生成一个纯数字的文件名
                const fileExt = file.name.split('.').pop(); // 提取后缀名
                const newFileName = `${Date.now()}_${Math.floor(Math.random() * 1000)}.${fileExt}`;

                const { data, error: upError } = await _supabase.storage
                    .from('images')
                    .upload(newFileName, file);
                
                if (upError) throw upError;

                // 获取不带乱码的纯净 URL
                img_url = _supabase.storage.from('images').getPublicUrl(newFileName).data.publicUrl;
            }
            // --- 图片处理结束 ---

            // 将数据存入数据库
            const { error: dbError } = await _supabase.from('stories').insert([{ 
                title, 
                content, 
                img_url, 
                event_date 
            }]);

            if (dbError) throw dbError;

            // 成功后关闭弹窗并刷新列表
            closeModal(); 
            loadStories();
            
            // 重置输入框
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
            fileInput.value = '';

        } catch (e) { 
            alert("保存失败，请检查网络或图片大小"); 
            console.error(e); 
        } finally { 
            btn.disabled = false; 
            btn.innerText = "保存到时间轴"; 
        }
    }
    function openModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('addModal').style.display = 'none'; }
</script>
</body>
</html>
